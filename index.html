<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cloud Video Editor</title>

<style>

body{
font-family:Arial;
background:#111;
color:#fff;
margin:0;
padding:20px;
}

#wrap{
max-width:900px;
margin:auto;
}

video{
width:100%;
background:#000;
}

#subOv{
position:absolute;
bottom:60px;
left:0;
right:0;
text-align:center;
font-size:28px;
font-weight:bold;
text-shadow:0 0 10px #000;
display:none;
}

#playerBox{
position:relative;
}

textarea{
width:100%;
height:140px;
background:#222;
color:#fff;
border:none;
padding:10px;
}

button{
padding:10px 20px;
margin-top:10px;
}

#prog{
height:6px;
background:#333;
margin-top:6px;
position:relative;
}

#bar{
height:6px;
background:#4caf50;
width:0%;
}

</style>
</head>

<body>

<div id="wrap">

<h2>Cloud Video Editor</h2>

<div id="playerBox">

<video id="vp" controls></video>

<div id="subOv"></div>

</div>

<div id="prog">
<div id="bar"></div>
</div>

<br>

<input type="file" id="fileVideo">

<h3>Титры</h3>

<textarea id="subTxt">
0:01 Привет!
0:04 Это тест титров
0:07 Они синхронизированы
0:10 Работает!
</textarea>

<br>

<label>
<input type="checkbox" id="subTog" checked>
Показывать титры
</label>

<br>

<button onclick="parseSubs()">Обновить титры</button>

</div>

<script>

var vEl = document.getElementById("vp");
var subsArr = [];
var subOv = document.getElementById("subOv");
var bar = document.getElementById("bar");

document.getElementById("fileVideo").addEventListener("change",function(e){

var file = e.target.files[0];

if(!file) return;

var url = URL.createObjectURL(file);

vEl.src = url;

});

function parseSubs(){

var txt = document.getElementById("subTxt").value.trim();

subsArr=[];

if(!txt) return;

var lines = txt.split("\n");

lines.forEach(function(line){

var m=line.match(/^(\d{1,2}):(\d{1,2})\s+(.+)/);

if(!m) return;

var t = parseInt(m[1])*60 + parseInt(m[2]);

subsArr.push({
t:t,
tx:m[3]
});

});

}

function updProg(){

if(!vEl.duration) return;

var p = (vEl.currentTime / vEl.duration) * 100;

bar.style.width = p+"%";

}

function updSubOv(ct){

if(!document.getElementById("subTog").checked){
subOv.style.display="none";
return;
}

if(!subsArr.length) return;

var txt="";

for(var i=0;i<subsArr.length;i++){

var next=subsArr[i+1];

if(ct >= subsArr[i].t && (!next || ct < next.t)){

txt=subsArr[i].tx;
break;

}

}

if(txt){

subOv.textContent=txt;
subOv.style.display="block";

}else{

subOv.style.display="none";

}

}

vEl.addEventListener("timeupdate",function(){

updProg();

updSubOv(vEl.currentTime);

});

vEl.addEventListener("seeked",function(){

updSubOv(vEl.currentTime);

});

parseSubs();

</script>

</body>
</html>
