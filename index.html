<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Универсальный Видеоплеер</title>
<style>
  body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    margin: 0; 
    padding: 20px; 
    text-align: center; 
    background-color: #eef2f5;
    background-size: cover; 
    background-position: center;
    background-attachment: fixed;
    transition: background 0.5s ease;
  }
  .container { 
    background: rgba(255, 255, 255, 0.95); 
    padding: 25px; 
    border-radius: 12px; 
    max-width: 900px; 
    margin: auto; 
    box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
  }
  #custom-logo { 
    max-height: 80px; 
    margin-bottom: 20px; 
    border-radius: 8px;
    display: none;
  }
  .controls-panel { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 15px; 
    text-align: left; 
    margin-bottom: 20px; 
    background: #f9f9f9;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
  }
  .controls-panel > div { display: flex; flex-direction: column; }
  label { font-size: 0.85em; font-weight: bold; margin-bottom: 5px; color: #333; }
  input, select, button { 
    padding: 8px; 
    border: 1px solid #ccc; 
    border-radius: 6px; 
    font-size: 13px;
    width: 100%; 
    box-sizing: border-box; 
  }
  button { 
    cursor: pointer; 
    background: #4caf50; 
    color: white; 
    border: none; 
    font-weight: bold; 
    transition: background 0.3s;
    margin-top: 10px;
    padding: 12px;
  }
  button:hover { background: #45a049; }
  
  /* Блок генерации Iframe */
  .iframe-panel {
    background: #e3f2fd;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #90caf9;
    margin-bottom: 25px;
    text-align: left;
  }
  .iframe-panel .flex-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .iframe-panel input { flex-grow: 1; background: #fff; font-family: monospace; }
  .iframe-panel button { margin-top: 0; width: auto; white-space: nowrap; background: #1976d2; }
  .iframe-panel button:hover { background: #1565c0; }

  video { 
    width: 100%; 
    border-radius: 10px; 
    background: #000; 
    outline: none; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }
  #transcription-box { 
    margin-top: 15px; 
    padding: 15px; 
    background: #fdfdfd; 
    border: 1px solid #ddd; 
    min-height: 80px; 
    max-height: 150px;
    border-radius: 6px; 
    text-align: left;
    font-size: 0.95em;
    color: #444;
    overflow-y: auto;
  }
</style>
</head>
<body>

<div class="container">
  <img id="custom-logo" src="" alt="Логотип">

  <div class="controls-panel">
    <div>
      <label data-i18n="logo_pc">Загрузить логотип (с ПК):</label>
      <input type="file" id="logo-upload" accept="image/*">
    </div>
    <div>
      <label data-i18n="logo_url">Вставить логотип (ссылка):</label>
      <input type="url" id="logo-url" placeholder="https://...">
    </div>
    <div>
      <label data-i18n="video_pc">Загрузить видео (с ПК):</label>
      <input type="file" id="video-upload" accept="video/*">
    </div>
    <div>
      <label data-i18n="video_url">Вставить видео (ссылка):</label>
      <input type="url" id="video-url" placeholder="https://.../video.mp4">
    </div>
    <div>
      <label data-i18n="bg_pc">Загрузить фон (с ПК):</label>
      <input type="file" id="bg-upload" accept="image/*">
    </div>
    <div>
      <label data-i18n="bg_url">Вставить фон (ссылка):</label>
      <input type="url" id="bg-url" placeholder="https://...">
    </div>
    <div style="grid-column: span 2;">
      <label data-i18n="lang_select">Выберите язык интерфейса и распознавания:</label>
      <select id="language-select">
        <option value="ru-RU">Русский (Russian)</option>
        <option value="en-US">Английский (English)</option>
        <option value="de-DE">Немецкий (German)</option>
        <option value="es-ES">Испанский (Spanish)</option>
        <option value="fr-FR">Французский (French)</option>
        <option value="it-IT">Итальянский (Italian)</option>
        <option value="pt-PT">Португальский (Portuguese)</option>
        <option value="zh-CN">Китайский (Chinese)</option>
        <option value="ja-JP">Японский (Japanese)</option>
        <option value="fa-IR">Фарси (Farsi)</option>
        <option value="prs-AF">Дари (Dari)</option>
        <option value="ar-SA">Арабский (Arabic)</option>
        <option value="hi-IN">Хинди (Hindi)</option>
      </select>
    </div>
  </div>

  <div class="iframe-panel">
    <label data-i18n="iframe_label">Код для встраивания (Iframe) в Genially и браузер:</label>
    <div class="flex-row">
      <input type="text" id="iframe-code" readonly>
      <button id="copy-iframe-btn" data-i18n="copy_btn">Копировать</button>
    </div>
  </div>

  <video id="video-player" controls crossorigin="anonymous">
    <track id="caption-track" label="Титры" kind="subtitles" srclang="ru" src="">
  </video>

  <div>
    <button id="transcribe-btn" data-i18n="start_trans">▶ Начать транскрибирование речи</button>
    <div id="transcription-box" data-i18n="trans_box_text">Здесь будет появляться распознанный текст... Разрешите доступ к микрофону.</div>
  </div>
</div>

<script>
  // Обновленный словарь переводов
  const translations = {
    "ru-RU": { logo_pc: "Загрузить логотип (с ПК):", logo_url: "Вставить логотип (ссылка):", video_pc: "Загрузить видео (с ПК):", video_url: "Вставить видео (ссылка):", bg_pc: "Загрузить фон (с ПК):", bg_url: "Вставить фон (ссылка):", lang_select: "Выберите язык интерфейса и распознавания:", start_trans: "▶ Начать транскрибирование", stop_trans: "⏹ Остановить", trans_box_text: "Здесь будет появляться распознанный текст...", iframe_label: "Код для встраивания (Iframe) в Genially и браузер:", copy_btn: "Копировать" },
    "en-US": { logo_pc: "Upload Logo (PC):", logo_url: "Insert Logo (URL):", video_pc: "Upload Video (PC):", video_url: "Insert Video (URL):", bg_pc: "Upload Background (PC):", bg_url: "Insert Background (URL):", lang_select: "Select Language:", start_trans: "▶ Start Transcription", stop_trans: "⏹ Stop", trans_box_text: "Recognized text will appear here...", iframe_label: "Embed code (Iframe) for Genially & browser:", copy_btn: "Copy" },
    "de-DE": { logo_pc: "Logo (PC):", logo_url: "Logo (URL):", video_pc: "Video (PC):", video_url: "Video (URL):", bg_pc: "Hintergrund (PC):", bg_url: "Hintergrund (URL):", lang_select: "Sprache auswählen:", start_trans: "▶ Transkription starten", stop_trans: "⏹ Stoppen", trans_box_text: "Text wird hier angezeigt...", iframe_label: "Einbettungscode (Iframe):", copy_btn: "Kopieren" },
    "es-ES": { logo_pc: "Logo (PC):", logo_url: "Logo (URL):", video_pc: "Video (PC):", video_url: "Video (URL):", bg_pc: "Fondo (PC):", bg_url: "Fondo (URL):", lang_select: "Seleccionar idioma:", start_trans: "▶ Iniciar transcripción", stop_trans: "⏹ Detener", trans_box_text: "El texto aparecerá aquí...", iframe_label: "Código de inserción (Iframe):", copy_btn: "Copiar" },
    "fr-FR": { logo_pc: "Logo (PC):", logo_url: "Logo (URL):", video_pc: "Vidéo (PC):", video_url: "Vidéo (URL):", bg_pc: "Fond (PC):", bg_url: "Fond (URL):", lang_select: "Sélectionner la langue:", start_trans: "▶ Démarrer la transcription", stop_trans: "⏹ Arrêter", trans_box_text: "Le texte apparaîtra ici...", iframe_label: "Code d'intégration (Iframe):", copy_btn: "Copier" },
    "it-IT": { logo_pc: "Logo (PC):", logo_url: "Logo (URL):", video_pc: "Video (PC):", video_url: "Video (URL):", bg_pc: "Sfondo (PC):", bg_url: "Sfondo (URL):", lang_select: "Seleziona la lingua:", start_trans: "▶ Avvia trascrizione", stop_trans: "⏹ Ferma", trans_box_text: "Il testo apparirà qui...", iframe_label: "Codice di incorporamento (Iframe):", copy_btn: "Copia" },
    "pt-PT": { logo_pc: "Logotipo (PC):", logo_url: "Logotipo (URL):", video_pc: "Vídeo (PC):", video_url: "Vídeo (URL):", bg_pc: "Fundo (PC):", bg_url: "Fundo (URL):", lang_select: "Selecione o idioma:", start_trans: "▶ Iniciar Transcrição", stop_trans: "⏹ Parar", trans_box_text: "O texto aparecerá aqui...", iframe_label: "Código de incorporação (Iframe):", copy_btn: "Copiar" },
    "zh-CN": { logo_pc: "徽标 (电脑):", logo_url: "徽标 (链接):", video_pc: "视频 (电脑):", video_url: "视频 (链接):", bg_pc: "背景 (电脑):", bg_url: "背景 (链接):", lang_select: "选择语言:", start_trans: "▶ 开始转录", stop_trans: "⏹ 停止", trans_box_text: "识别的文本将显示在这里...", iframe_label: "嵌入代码 (Iframe):", copy_btn: "复制" },
    "ja-JP": { logo_pc: "ロゴ (PC):", logo_url: "ロゴ (URL):", video_pc: "動画 (PC):", video_url: "動画 (URL):", bg_pc: "背景 (PC):", bg_url: "背景 (URL):", lang_select: "言語を選択:", start_trans: "▶ 文字起こしを開始", stop_trans: "⏹ 停止", trans_box_text: "テキストがここに表示されます...", iframe_label: "埋め込みコード (Iframe):", copy_btn: "コピー" },
    "fa-IR": { logo_pc: "لوگو (رایانه):", logo_url: "لوگو (لینک):", video_pc: "ویدیو (رایانه):", video_url: "ویدیو (لینک):", bg_pc: "پس‌زمینه (رایانه):", bg_url: "پس‌زمینه (لینک):", lang_select: "انتخاب زبان:", start_trans: "▶ شروع رونویسی", stop_trans: "⏹ توقف", trans_box_text: "متن در اینجا ظاهر می شود...", iframe_label: "کد جاسازی (Iframe):", copy_btn: "کپی" },
    "prs-AF": { logo_pc: "لوگو (کمپیوتر):", logo_url: "لوگو (لینک):", video_pc: "ویدیو (کمپیوتر):", video_url: "ویدیو (لینک):", bg_pc: "پس‌زمینه (کمپیوتر):", bg_url: "پس‌زمینه (لینک):", lang_select: "انتخاب زبان:", start_trans: "▶ شروع رونویسی", stop_trans: "⏹ توقف", trans_box_text: "متن در اینجا ظاهر می شود...", iframe_label: "کد جابجایی (Iframe):", copy_btn: "کاپي" },
    "ar-SA": { logo_pc: "شعار (كمبيوتر):", logo_url: "شعار (رابط):", video_pc: "فيديو (كمبيوتر):", video_url: "فيديو (رابط):", bg_pc: "خلفية (كمبيوتر):", bg_url: "خلفية (رابط):", lang_select: "اختر اللغة:", start_trans: "▶ بدء النسخ", stop_trans: "⏹ إيقاف", trans_box_text: "سيظهر النص هنا...", iframe_label: "كود التضمين (Iframe):", copy_btn: "نسخ" },
    "hi-IN": { logo_pc: "लोगो (PC):", logo_url: "लोगो (URL):", video_pc: "वीडियो (PC):", video_url: "वीडियो (URL):", bg_pc: "बैकग्राउंड (PC):", bg_url: "बैकग्राउंड (URL):", lang_select: "भाषा चुनें:", start_trans: "▶ ट्रांसक्रिप्शन शुरू करें", stop_trans: "⏹ रोकें", trans_box_text: "टेक्स्ट यहाँ दिखाई देगा...", iframe_label: "एंबेड कोड (Iframe):", copy_btn: "कॉपी करें" }
  };

  const languageSelect = document.getElementById('language-select');
  const transcribeBtn = document.getElementById('transcribe-btn');
  const transcriptionBox = document.getElementById('transcription-box');

  // Логика Iframe
  const iframeInput = document.getElementById('iframe-code');
  const copyBtn = document.getElementById('copy-iframe-btn');

  // Генерируем iframe на основе адреса, где открыт этот файл
  const currentUrl = window.location.href;
  if (currentUrl.startsWith('file://')) {
    iframeInput.value = 'Загрузите этот файл на GitHub Pages, чтобы получить рабочую ссылку.';
  } else {
    iframeInput.value = `<iframe src="${currentUrl.split('?')[0]}" width="100%" height="800px" frameborder="0" allow="microphone; autoplay; fullscreen"></iframe>`;
  }

  copyBtn.addEventListener('click', () => {
    iframeInput.select();
    document.execCommand('copy');
    const originalText = copyBtn.innerText;
    copyBtn.innerText = '✔ Скопировано!';
    setTimeout(() => { copyBtn.innerText = originalText; updateLanguage(); }, 2000);
  });

  function updateLanguage() {
    const lang = languageSelect.value;
    const dict = translations[lang] || translations["ru-RU"];
    
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (dict[key]) {
        if (el.tagName === 'BUTTON' && recognitionIsRunning && key === 'start_trans') {
           el.innerText = dict["stop_trans"];
        } else if (el.tagName === 'BUTTON' && el.innerText === '✔ Скопировано!') {
           // Не переводим в момент анимации копирования
        } else {
           el.innerText = dict[key];
        }
      }
    });
    
    if(lang === 'fa-IR' || lang === 'ar-SA' || lang === 'prs-AF') {
        document.body.style.direction = "rtl";
    } else {
        document.body.style.direction = "ltr";
    }
  }

  languageSelect.addEventListener('change', updateLanguage);

  function handleUpload(inputId, targetId, isBackground, isLogo) {
    document.getElementById(inputId).addEventListener('change', function(e) {
      if(e.target.files[0]) {
        const url = URL.createObjectURL(e.target.files[0]);
        if(isBackground) document.body.style.backgroundImage = `url(${url})`;
        else {
            const el = document.getElementById(targetId);
            el.src = url;
            if(isLogo) el.style.display = 'inline-block';
        }
      }
    });
  }
  function handleUrl(inputId, targetId, isBackground, isLogo) {
    document.getElementById(inputId).addEventListener('change', function(e) {
      if(e.target.value) {
        if(isBackground) document.body.style.backgroundImage = `url(${e.target.value})`;
        else {
            const el = document.getElementById(targetId);
            el.src = e.target.value;
            if(isLogo) el.style.display = 'inline-block';
        }
      }
    });
  }

  handleUpload('logo-upload', 'custom-logo', false, true);
  handleUrl('logo-url', 'custom-logo', false, true);
  handleUpload('video-upload', 'video-player', false, false);
  handleUrl('video-url', 'video-player', false, false);
  handleUpload('bg-upload', '', true, false);
  handleUrl('bg-url', '', true, false);

  let recognition;
  let recognitionIsRunning = false;

  transcribeBtn.addEventListener('click', () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const dict = translations[languageSelect.value] || translations["ru-RU"];

    if (!SpeechRecognition) {
      alert('Ваш браузер не поддерживает распознавание речи. Используйте Google Chrome.');
      return;
    }

    if(recognitionIsRunning) {
        recognition.stop();
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = languageSelect.value;
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onstart = function() {
      recognitionIsRunning = true;
      transcribeBtn.innerText = dict["stop_trans"];
      transcriptionBox.innerHTML = '<em>...</em><br>';
    };

    recognition.onresult = function(event) {
      let finalTranscript = '';
      for (let i = event.resultIndex; i < event.results.length; ++i) {
        if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript + ' ';
      }
      if(finalTranscript) {
         transcriptionBox.innerHTML += finalTranscript + '<br>';
         transcriptionBox.scrollTop = transcriptionBox.scrollHeight;
      }
    };

    recognition.onerror = function(event) {
      if(event.error === 'not-allowed') alert('Доступ к микрофону запрещен!');
      recognitionIsRunning = false;
      transcribeBtn.innerText = dict["start_trans"];
    };

    recognition.onend = function() {
      recognitionIsRunning = false;
      transcribeBtn.innerText = dict["start_trans"];
    };

    try { recognition.start(); } catch(e) {}
  });

  updateLanguage();
</script>
</body>
</html>
