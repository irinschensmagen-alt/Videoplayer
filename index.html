<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎬 Super Video Editor</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      --radius: 12px;
      --transition: all 0.2s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Logo Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .logo {
      max-height: 60px;
      border-radius: 8px;
      transition: var(--transition);
    }

    .logo:hover {
      transform: scale(1.03);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
    }

    /* Main Grid */
    .editor-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .editor-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: sticky;
      top: 20px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }

    .panel {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }

    .panel-title {
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.05rem;
    }

    .panel-title::before {
      content: "•";
      color: var(--primary);
      font-size: 1.4rem;
      line-height: 0.5;
    }

    .input-group {
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      transition: var(--transition);
    }

    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 0.85rem;
      width: auto;
    }

    .language-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    /* Video Area */
    .video-area {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .video-container {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed var(--border);
    }

    .video-container.has-video {
      border-style: solid;
      border-color: var(--primary);
    }

    #mainVideo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    .video-placeholder {
      text-align: center;
      color: var(--text-muted);
      padding: 20px;
    }

    .video-placeholder svg {
      width: 64px;
      height: 64px;
      margin-bottom: 12px;
      opacity: 0.6;
    }

    /* Controls */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .progress-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #progressBar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    #progressFill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      border-radius: 3px;
      transition: width 0.1s linear;
    }

    .time-display {
      font-family: monospace;
      font-size: 0.9rem;
      color: var(--text-muted);
      min-width: 100px;
      text-align: center;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-btn {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      font-size: 1.1rem;
    }

    .control-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      transform: scale(1.05);
    }

    .control-btn:active {
      transform: scale(0.98);
    }

    .control-btn.play-pause {
      width: 50px;
      height: 50px;
      font-size: 1.3rem;
      background: var(--primary);
      border-color: var(--primary);
    }

    .control-btn.play-pause:hover {
      background: var(--primary-hover);
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #volumeSlider {
      width: 80px;
      height: 4px;
      accent-color: var(--primary);
    }

    /* Subtitles & Transcription */
    .subtitle-area {
      background: rgba(30, 41, 59, 0.4);
      border-radius: 8px;
      padding: 12px;
      max-height: 120px;
      overflow-y: auto;
      font-size: 0.95rem;
      line-height: 1.4;
      border-left: 3px solid var(--primary);
    }

    .transcription-area {
      background: rgba(30, 41, 59, 0.4);
      border-radius: 8px;
      padding: 12px;
      max-height: 150px;
      overflow-y: auto;
      font-size: 0.9rem;
      white-space: pre-wrap;
      border-left: 3px solid var(--success);
    }

    .feature-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .feature-toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    /* Status & Messages */
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      display: none;
    }

    .status.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .status.success {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid var(--success);
      color: #86efac;
    }

    .status.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid var(--danger);
      color: #fca5a5;
    }

    .status.info {
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid var(--primary);
      color: #a5b4fc;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive iframe support */
    @media (max-width: 600px) {
      .control-row {
        flex-direction: column;
        align-items: stretch;
      }
      .time-display {
        min-width: auto;
      }
      .volume-control {
        justify-content: center;
      }
      .language-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Hide file input visually */
    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
      width: 100%;
    }

    .file-input-wrapper input[type=file] {
      position: absolute;
      font-size: 100px;
      right: 0;
      top: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* Transcription loading */
    .transcribing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--warning);
      font-size: 0.9rem;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(245, 158, 11, 0.3);
      border-top-color: var(--warning);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo Header -->
    <header class="header">
      <img 
        src="https://img.genially.com/63a7016fe7745e0013a04f69/a5b6a171-06c6-47b1-92a2-5755e52e415b.png" 
        alt="Group Logo" 
        class="logo"
        onerror="this.style.display='none'; console.log('Logo not loaded')"
      />
    </header>

    <div class="editor-grid">
      <!-- Sidebar: Upload & Settings -->
      <aside class="sidebar">
        <!-- Video Upload -->
        <div class="panel">
          <div class="panel-title">📹 Видео</div>
          <div class="input-group">
            <label>Загрузить с компьютера</label>
            <div class="file-input-wrapper">
              <button class="btn btn-outline">📁 Выбрать файл</button>
              <input type="file" id="videoFile" accept="video/*" />
            </div>
          </div>
          <div class="input-group">
            <label>Или вставить ссылку</label>
            <input type="url" id="videoUrl" placeholder="https://example.com/video.mp4" />
            <button class="btn" id="loadUrlBtn" style="margin-top:8px">🔗 Загрузить</button>
          </div>
        </div>

        <!-- Background -->
        <div class="panel">
          <div class="panel-title">🎨 Фон</div>
          <div class="input-group">
            <label>Загрузить с компьютера</label>
            <div class="file-input-wrapper">
              <button class="btn btn-outline">📁 Выбрать изображение</button>
              <input type="file" id="bgFile" accept="image/*" />
            </div>
          </div>
          <div class="input-group">
            <label>Или вставить ссылку</label>
            <input type="url" id="bgUrl" placeholder="https://example.com/background.jpg" />
            <button class="btn" id="loadBgUrlBtn" style="margin-top:8px">🔗 Загрузить</button>
          </div>
        </div>

        <!-- Language Selection -->
        <div class="panel">
          <div class="panel-title">🌐 Язык</div>
          <div class="input-group">
            <label>Для интерфейса, титров и транскрипции</label>
            <select id="languageSelect">
              <option value="ru">🇷🇺 Русский</option>
              <option value="de">🇩🇪 Deutsch</option>
              <option value="en" selected>🇬🇧 English</option>
              <option value="es">🇪🇸 Español</option>
              <option value="fr">🇫🇷 Français</option>
              <option value="it">🇮🇹 Italiano</option>
              <option value="zh">🇨🇳 中文</option>
              <option value="ja">🇯🇵 日本語</option>
            </select>
          </div>
          <div class="input-group">
            <label>Титры (файл .vtt)</label>
            <div class="file-input-wrapper">
              <button class="btn btn-outline btn-sm">📄 Загрузить .vtt</button>
              <input type="file" id="subtitleFile" accept=".vtt,.srt" />
            </div>
          </div>
        </div>

        <!-- Features -->
        <div class="panel">
          <div class="panel-title">⚙️ Функции</div>
          <label class="feature-toggle">
            <input type="checkbox" id="subtitlesToggle" />
            <span>Показывать титры</span>
          </label>
          <label class="feature-toggle" style="margin-top:10px">
            <input type="checkbox" id="transcribeToggle" />
            <span>Транскрибировать (экспериментально)</span>
          </label>
          <div id="transcribeStatus" class="status info" style="margin-top:10px">
            💡 Транскрипция работает через Web Speech API (только Chrome/Edge)
          </div>
        </div>
      </aside>

      <!-- Main Video Area -->
      <main class="video-area">
        <div class="video-container" id="videoContainer">
          <video id="mainVideo" controlslist="nodownload" preload="metadata"></video>
          <div class="video-placeholder" id="videoPlaceholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h1.447a1 1 0 00.894-.553L10 14M4 6h16a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2z"/>
            </svg>
            <p>Загрузите видео или вставьте ссылку</p>
          </div>
        </div>

        <!-- Controls -->
        <div class="controls">
          <div class="progress-container">
            <span class="time-display" id="currentTime">0:00</span>
            <div id="progressBar">
              <div id="progressFill"></div>
            </div>
            <span class="time-display" id="duration">0:00</span>
          </div>

          <div class="control-row">
            <div class="control-group">
              <button class="control-btn" id="rewindBtn" title="Назад 10 сек">⏪</button>
              <button class="control-btn play-pause" id="playPauseBtn">▶️</button>
              <button class="control-btn" id="forwardBtn" title="Вперёд 10 сек">⏩</button>
            </div>

            <div class="control-group volume-control">
              <button class="control-btn" id="muteBtn" title="Громкость">🔊</button>
              <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" />
            </div>

            <div class="control-group">
              <button class="btn btn-sm" id="downloadBtn" disabled>💾 Скачать проект</button>
            </div>
          </div>

          <!-- Subtitles Display -->
          <div class="subtitle-area" id="subtitleDisplay" style="display:none">
            <!-- Subtitles will appear here -->
          </div>

          <!-- Transcription Output -->
          <div class="transcription-area" id="transcriptionOutput" style="display:none">
            <!-- Transcription text will appear here -->
          </div>
        </div>

        <!-- Status Messages -->
        <div id="statusMessage" class="status"></div>
      </main>
    </div>
  </div>

  <script>
    // ==================== CONFIG & STATE ====================
    const state = {
      video: null,
      isPlaying: false,
      currentLang: 'en',
      subtitles: [],
      isTranscribing: false,
      recognition: null,
      backgroundUrl: null
    };

    // Translations for UI
    const translations = {
      ru: { placeholder: 'Загрузите видео или вставьте ссылку', play: '▶️', pause: '⏸️', mute: '🔇', unmute: '🔊' },
      de: { placeholder: 'Video hochladen oder Link einfügen', play: '▶️', pause: '⏸️', mute: '🔇', unmute: '🔊' },
      en: { placeholder: 'Upload video or paste link', play: '▶️', pause: '⏸️', mute: '🔇', unmute: '🔊' },
      es: { placeholder: 'Sube un video o pega un enlace', play: '▶️', pause: '⏸️', mute: '🔇', unmute: '🔊' },
      fr: { placeholder: 'Télécharger une vidéo ou coller un lien', play: '▶️', pause: '⏸️', mute: '🔇', unmute: '🔊' },
      it: { placeholder: 'Carica un video o incolla un link', play: '▶️', pause: '⏸️', mute: '🔇', unmute: '🔊' },
      zh: { placeholder: '上传视频或粘贴链接', play: '▶️', pause: '⏸️', mute: '🔇', unmute: '🔊' },
      ja: { placeholder: '動画をアップロードまたはリンクを貼り付け', play: '▶️', pause: '⏸️', mute: '🔇', unmute: '🔊' }
    };

    // ==================== DOM ELEMENTS ====================
    const els = {
      video: document.getElementById('mainVideo'),
      container: document.getElementById('videoContainer'),
      placeholder: document.getElementById('videoPlaceholder'),
      playPause: document.getElementById('playPauseBtn'),
      rewind: document.getElementById('rewindBtn'),
      forward: document.getElementById('forwardBtn'),
      mute: document.getElementById('muteBtn'),
      volume: document.getElementById('volumeSlider'),
      progress: document.getElementById('progressBar'),
      progressFill: document.getElementById('progressFill'),
      currentTime: document.getElementById('currentTime'),
      duration: document.getElementById('duration'),
      videoFile: document.getElementById('videoFile'),
      videoUrl: document.getElementById('videoUrl'),
      loadUrlBtn: document.getElementById('loadUrlBtn'),
      bgFile: document.getElementById('bgFile'),
      bgUrl: document.getElementById('bgUrl'),
      loadBgUrlBtn: document.getElementById('loadBgUrlBtn'),
      langSelect: document.getElementById('languageSelect'),
      subtitleFile: document.getElementById('subtitleFile'),
      subtitlesToggle: document.getElementById('subtitlesToggle'),
      subtitleDisplay: document.getElementById('subtitleDisplay'),
      transcribeToggle: document.getElementById('transcribeToggle'),
      transcribeOutput: document.getElementById('transcriptionOutput'),
      transcribeStatus: document.getElementById('transcribeStatus'),
      statusMsg: document.getElementById('statusMessage'),
      downloadBtn: document.getElementById('downloadBtn')
    };

    // ==================== UTILITIES ====================
    function formatTime(seconds) {
      if (isNaN(seconds) || seconds < 0) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function showStatus(message, type = 'info', duration = 3000) {
      els.statusMsg.textContent = message;
      els.statusMsg.className = `status ${type} show`;
      if (duration) {
        setTimeout(() => {
          els.statusMsg.classList.remove('show');
        }, duration);
      }
    }

    function updateUIForLanguage(lang) {
      const t = translations[lang] || translations.en;
      els.placeholder.querySelector('p').textContent = t.placeholder;
      els.playPause.textContent = state.isPlaying ? t.pause : t.play;
      // Add more translations as needed
    }

    // ==================== VIDEO HANDLING ====================
    function loadVideoFromURL(url) {
      if (!url) return showStatus('⚠️ Введите корректную ссылку', 'error');
      
      // Basic validation for common video hosts
      const isDirect = /\.(mp4|webm|ogg|mov)($|\?)/i.test(url);
      const isYouTube = /youtube\.com|youtu\.be/.test(url);
      const isVimeo = /vimeo\.com/.test(url);
      
      if (isYouTube || isVimeo) {
        showStatus('⚠️ Прямые ссылки YouTube/Vimeo не поддерживаются. Используйте прямую ссылку на .mp4 файл.', 'warning', 5000);
        return;
      }
      
      if (!isDirect) {
        showStatus('⚠️ Используйте прямую ссылку на видеофайл (.mp4, .webm)', 'warning', 5000);
      }
      
      els.video.src = url;
      setupVideoElement();
      showStatus('✅ Видео загружено по ссылке', 'success');
    }

    function loadVideoFromFile(file) {
      if (!file) return;
      if (!file.type.startsWith('video/')) {
        return showStatus('❌ Выберите видеофайл', 'error');
      }
      if (file.size > 2 * 1024 * 1024 * 1024) { // 2GB limit warning
        showStatus('⚠️ Файл больше 2 ГБ может работать медленно', 'warning', 5000);
      }
      
      const url = URL.createObjectURL(file);
      els.video.src = url;
      setupVideoElement();
      showStatus(`✅ Загружено: ${file.name}`, 'success');
    }

    function setupVideoElement() {
      els.container.classList.add('has-video');
      els.placeholder.style.display = 'none';
      els.video.style.display = 'block';
      els.video.load();
      els.downloadBtn.disabled = false;
      
      // Event listeners
      els.video.onloadedmetadata = () => {
        els.duration.textContent = formatTime(els.video.duration);
      };
      
      els.video.ontimeupdate = () => {
        els.currentTime.textContent = formatTime(els.video.currentTime);
        const percent = (els.video.currentTime / els.video.duration) * 100;
        els.progressFill.style.width = `${percent || 0}%`;
        
        // Update subtitles
        if (state.subtitlesToggle.checked && state.subtitles.length > 0) {
          updateSubtitlesDisplay(els.video.currentTime);
        }
      };
      
      els.video.onended = () => {
        state.isPlaying = false;
        els.playPause.textContent = translations[state.currentLang]?.play || '▶️';
      };
      
      els.video.onerror = (e) => {
        showStatus('❌ Ошибка загрузки видео. Проверьте ссылку или формат файла.', 'error', 6000);
        console.error('Video error:', e);
      };
    }

    // ==================== CONTROLS ====================
    els.playPause.addEventListener('click', () => {
      if (!els.video.src) return showStatus('⚠️ Сначала загрузите видео', 'info');
      
      if (state.isPlaying) {
        els.video.pause();
        els.playPause.textContent = translations[state.currentLang]?.play || '▶️';
      } else {
        els.video.play().catch(e => {
          showStatus('❌ Не удалось воспроизвести: ' + e.message, 'error', 4000);
        });
        els.playPause.textContent = translations[state.currentLang]?.pause || '⏸️';
      }
      state.isPlaying = !state.isPlaying;
    });

    els.rewind.addEventListener('click', () => {
      els.video.currentTime = Math.max(0, els.video.currentTime - 10);
    });

    els.forward.addEventListener('click', () => {
      els.video.currentTime = Math.min(els.video.duration || 0, els.video.currentTime + 10);
    });

    els.mute.addEventListener('click', () => {
      els.video.muted = !els.video.muted;
      els.mute.textContent = els.video.muted 
        ? (translations[state.currentLang]?.mute || '🔇') 
        : (translations[state.currentLang]?.unmute || '🔊');
    });

    els.volume.addEventListener('input', (e) => {
      els.video.volume = e.target.value;
      els.video.muted = e.target.value == 0;
      els.mute.textContent = els.video.muted ? '🔇' : '🔊';
    });

    els.progress.addEventListener('click', (e) => {
      if (!els.video.duration) return;
      const rect = els.progress.getBoundingClientRect();
      const pos = (e.clientX - rect.left) / rect.width;
      els.video.currentTime = pos * els.video.duration;
    });

    // ==================== SUBTITLES ====================
    function parseSubtitles(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const content = e.target.result;
        // Simple VTT parser (basic implementation)
        if (content.includes('WEBVTT')) {
          const lines = content.split('\n');
          state.subtitles = [];
          let current = null;
          
          for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line || line === 'WEBVTT' || line.match(/^\d+$/)) continue;
            
            if (line.includes('-->')) {
              const [start, end] = line.split('-->').map(t => parseVTTTime(t.trim()));
              current = { start, end, text: '' };
            } else if (current && line) {
              current.text += (current.text ? ' ' : '') + line;
            } else if (current && !line) {
              if (current.text) state.subtitles.push(current);
              current = null;
            }
          }
          if (current?.text) state.subtitles.push(current);
          
          showStatus(`✅ Загружено ${state.subtitles.length} субтитров`, 'success');
        } else {
          showStatus('⚠️ Поддерживаются только файлы .vtt (WEBVTT)', 'warning', 4000);
        }
      };
      reader.readAsText(file);
    }

    function parseVTTTime(timeStr) {
      // Format: HH:MM:SS.mmm or MM:SS.mmm
      const parts = timeStr.split(':');
      if (parts.length < 2) return 0;
      
      let hours = 0, minutes, seconds;
      if (parts.length === 3) {
        [hours, minutes, seconds] = parts;
      } else {
        [minutes, seconds] = parts;
      }
      
      const [secs, ms] = seconds.split('.');
      return parseInt(hours) * 3600 + parseInt(minutes) * 60 + parseInt(secs) + (ms ? parseInt(ms) / 1000 : 0);
    }

    function updateSubtitlesDisplay(currentTime) {
      const active = state.subtitles.find(s => 
        currentTime >= s.start && currentTime <= s.end
      );
      els.subtitleDisplay.textContent = active?.text || '';
      els.subtitleDisplay.style.display = active ? 'block' : 'none';
    }

    // ==================== TRANSCRIPTION (Web Speech API) ====================
    function initTranscription() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        showStatus('❌ Транскрипция не поддерживается в этом браузере', 'error', 5000);
        els.transcribeToggle.checked = false;
        return null;
      }
      
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = state.currentLang === 'zh' ? 'zh-CN' : 
                        state.currentLang === 'ja' ? 'ja-JP' : 
                        state.currentLang;
      
      recognition.onstart = () => {
        state.isTranscribing = true;
        els.transcribeStatus.innerHTML = '<span class="transcribing"><span class="spinner"></span> Идёт транскрипция...</span>';
        els.transcribeStatus.className = 'status info show';
      };
      
      recognition.onresult = (event) => {
        let finalTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalTranscript += transcript + '\n';
          }
        }
        if (finalTranscript) {
          els.transcriptionOutput.textContent += finalTranscript;
          els.transcriptionOutput.scrollTop = els.transcriptionOutput.scrollHeight;
        }
      };
      
      recognition.onerror = (event) => {
        console.error('Speech recognition error', event.error);
        showStatus(`⚠️ Ошибка транскрипции: ${event.error}`, 'warning', 4000);
        stopTranscription();
      };
      
      recognition.onend = () => {
        if (state.isTranscribing && els.video && !els.video.paused) {
          // Auto-restart if video is playing
          try { recognition.start(); } catch(e) {}
        } else {
          stopTranscription();
        }
      };
      
      return recognition;
    }

    function startTranscription() {
      if (!els.video.src) return showStatus('⚠️ Загрузите видео для транскрипции', 'info');
      
      state.recognition = initTranscription();
      if (!state.recognition) return;
      
      try {
        state.recognition.start();
        els.transcriptionOutput.style.display = 'block';
        els.transcriptionOutput.textContent = '';
        showStatus('🎙️ Транскрипция запущена', 'success', 2000);
      } catch (e) {
        showStatus('❌ Не удалось запустить транскрипцию', 'error');
      }
    }

    function stopTranscription() {
      state.isTranscribing = false;
      if (state.recognition) {
        state.recognition.stop();
      }
      els.transcribeStatus.textContent = '💡 Транскрипция остановлена';
      els.transcribeStatus.className = 'status info show';
      setTimeout(() => {
        if (!state.isTranscribing) {
          els.transcribeStatus.classList.remove('show');
        }
      }, 3000);
    }

    els.transcribeToggle.addEventListener('change', (e) => {
      if (e.target.checked) {
        startTranscription();
      } else {
        stopTranscription();
      }
    });

    // ==================== EVENT LISTENERS ====================
    // Video upload
    els.videoFile.addEventListener('change', (e) => {
      loadVideoFromFile(e.target.files[0]);
    });

    els.loadUrlBtn.addEventListener('click', () => {
      loadVideoFromURL(els.videoUrl.value.trim());
    });

    els.videoUrl.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadVideoFromURL(els.videoUrl.value.trim());
    });

    // Background upload
    els.bgFile.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file && file.type.startsWith('image/')) {
        state.backgroundUrl = URL.createObjectURL(file);
        els.container.style.backgroundImage = `url(${state.backgroundUrl})`;
        els.container.style.backgroundSize = 'cover';
        els.container.style.backgroundPosition = 'center';
        showStatus('✅ Фон установлен', 'success');
      }
    });

    els.loadBgUrlBtn.addEventListener('click', () => {
      const url = els.bgUrl.value.trim();
      if (url) {
        state.backgroundUrl = url;
        els.container.style.backgroundImage = `url(${url})`;
        els.container.style.backgroundSize = 'cover';
        els.container.style.backgroundPosition = 'center';
        showStatus('✅ Фон загружен по ссылке', 'success');
      }
    });

    // Language change
    els.langSelect.addEventListener('change', (e) => {
      state.currentLang = e.target.value;
      updateUIForLanguage(state.currentLang);
      
      // Update speech recognition language if active
      if (state.recognition && state.isTranscribing) {
        stopTranscription();
        startTranscription();
      }
      
      showStatus(`🌐 Язык изменён: ${e.target.options[e.target.selectedIndex].text}`, 'success', 2000);
    });

    // Subtitles upload
    els.subtitleFile.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) parseSubtitles(file);
    });

    // Subtitles toggle
    els.subtitlesToggle.addEventListener('change', (e) => {
      els.subtitleDisplay.style.display = e.target.checked ? 'block' : 'none';
      if (e.target.checked && state.subtitles.length === 0) {
        showStatus('💡 Загрузите файл .vtt для отображения титров', 'info', 4000);
      }
    });

    // Download project (mock)
    els.downloadBtn.addEventListener('click', () => {
      const project = {
        video: els.video.src,
        background: state.backgroundUrl,
        language: state.currentLang,
        subtitles: state.subtitlesToggle.checked,
        timestamp: new Date().toISOString()
      };
      
      const blob = new Blob([JSON.stringify(project, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `video-project-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showStatus('💾 Проект сохранён!', 'success');
    });

    // ==================== INITIALIZATION ====================
    document.addEventListener('DOMContentLoaded', () => {
      // Set initial language
      updateUIForLanguage(state.currentLang);
      
      // Initialize volume
      els.video.volume = els.volume.value;
      
      // Show browser compatibility note for transcription
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        els.transcribeToggle.disabled = true;
        els.transcribeToggle.title = 'Не поддерживается в этом браузере';
        els.transcribeStatus.textContent = '❌ Транскрипция доступна только в Chrome, Edge, Safari (новейшие версии)';
        els.transcribeStatus.className = 'status error show';
      }
      
      // Handle iframe embedding: adjust height
      if (window.self !== window.top) {
        document.body.style.padding = '8px';
        // Optional: send height to parent for Genially
        const updateHeight = () => {
          const height = document.documentElement.offsetHeight;
          window.parent.postMessage({ type: 'resize', height }, '*');
        };
        updateHeight();
        new ResizeObserver(updateHeight).observe(document.body);
      }
    });

    // Handle messages from parent (for Genially iframe)
    window.addEventListener('message', (event) => {
      if (event.data?.type === 'play') {
        if (!state.isPlaying && els.video.src) {
          els.video.play();
          state.isPlaying = true;
          els.playPause.textContent = translations[state.currentLang]?.pause || '⏸️';
        }
      } else if (event.data?.type === 'pause') {
        if (state.isPlaying) {
          els.video.pause();
          state.isPlaying = false;
          els.playPause.textContent = translations[state.currentLang]?.play || '▶️';
        }
      }
    });
  </script>
</body>
</html>
