<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Универсальный Видеоплеер</title>
<style>
  body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    margin: 0; 
    padding: 20px; 
    text-align: center; 
    transition: background 0.5s ease; 
    background-size: cover; 
    background-position: center;
    background-attachment: fixed;
    background-color: #eef2f5;
  }
  .container { 
    background: rgba(255, 255, 255, 0.95); 
    padding: 25px; 
    border-radius: 12px; 
    max-width: 800px; 
    margin: auto; 
    box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
  }
  /* Логотип вашей группы */
  #logo { 
    max-height: 80px; 
    margin-bottom: 20px; 
    border-radius: 8px;
  }
  .controls-panel { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 15px; 
    text-align: left; 
    margin-bottom: 25px; 
  }
  .controls-panel > div {
    display: flex;
    flex-direction: column;
  }
  label { font-size: 0.9em; font-weight: bold; margin-bottom: 5px; color: #333; }
  input, select, button { 
    padding: 10px; 
    border: 1px solid #ccc; 
    border-radius: 6px; 
    font-size: 14px;
    width: 100%; 
    box-sizing: border-box; 
  }
  button { 
    cursor: pointer; 
    background: #4caf50; 
    color: white; 
    border: none; 
    font-weight: bold; 
    transition: background 0.3s;
    margin-top: 10px;
  }
  button:hover { background: #45a049; }
  
  /* HTML5 Видеоплеер (включает время, прокрутку, громкость) */
  video { 
    width: 100%; 
    border-radius: 10px; 
    background: #000; 
    outline: none; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }
  #transcription-box { 
    margin-top: 15px; 
    padding: 15px; 
    background: #fdfdfd; 
    border: 1px solid #ddd; 
    min-height: 80px; 
    border-radius: 6px; 
    text-align: left;
    font-size: 0.95em;
    color: #444;
    max-height: 150px;
    overflow-y: auto;
  }
</style>
</head>
<body>

<div class="container" id="main-container">
  <img id="logo" src="https://via.placeholder.com/400x100?text=ЛОГОТИП+ВАШЕЙ+ГРУППЫ" alt="Логотип группы">

  <div class="controls-panel">
    <div>
      <label>1. Загрузить видео (с ПК):</label>
      <input type="file" id="video-upload" accept="video/*">
    </div>
    <div>
      <label>2. Вставить видео (по ссылке):</label>
      <input type="url" id="video-url" placeholder="https://.../video.mp4">
    </div>
    <div>
      <label>3. Загрузить фон (с ПК):</label>
      <input type="file" id="bg-upload" accept="image/*">
    </div>
    <div>
      <label>4. Вставить фон (по ссылке):</label>
      <input type="url" id="bg-url" placeholder="https://.../background.jpg">
    </div>
    <div style="grid-column: span 2;">
      <label>5. Выберите язык интерфейса/распознавания:</label>
      <select id="language-select">
        <option value="ru-RU">Русский</option>
        <option value="de-DE">Немецкий</option>
        <option value="en-US">Английский</option>
        <option value="es-ES">Испанский</option>
        <option value="fr-FR">Французский</option>
        <option value="it-IT">Итальянский</option>
        <option value="zh-CN">Китайский</option>
        <option value="ja-JP">Японский</option>
        <option value="fa-IR">Фарси</option>
        <option value="hi-IN">Хинди</option>
        <option value="prs-AF">Дари</option>
        <option value="ar-SA">Арабский</option>
        <option value="pt-PT">Португальский</option>
      </select>
    </div>
  </div>

  <video id="video-player" controls crossorigin="anonymous">
    <track id="caption-track" label="Титры" kind="subtitles" srclang="ru" src="">
    Ваш браузер не поддерживает HTML5 видео.
  </video>

  <div>
    <button id="transcribe-btn">▶ Начать транскрибирование речи (Web Speech API)</button>
    <div id="transcription-box">Здесь будет появляться распознанный текст видео...</div>
  </div>
</div>

<script>
  const videoPlayer = document.getElementById('video-player');
  const videoUpload = document.getElementById('video-upload');
  const videoUrl = document.getElementById('video-url');
  
  const body = document.body;
  const bgUpload = document.getElementById('bg-upload');
  const bgUrl = document.getElementById('bg-url');

  const transcribeBtn = document.getElementById('transcribe-btn');
  const transcriptionBox = document.getElementById('transcription-box');
  const languageSelect = document.getElementById('language-select');

  // 1. Загрузка видео с компьютера
  videoUpload.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if(file) {
      videoPlayer.src = URL.createObjectURL(file);
    }
  });

  // 2. Вставка видео по ссылке (важно: ссылка должна оканчиваться на .mp4, .webm и позволять CORS)
  videoUrl.addEventListener('change', function(e) {
    if(e.target.value) {
      videoPlayer.src = e.target.value;
    }
  });

  // 3. Загрузка фона с компьютера
  bgUpload.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if(file) {
      body.style.backgroundImage = `url(${URL.createObjectURL(file)})`;
    }
  });

  // 4. Вставка фона по ссылке
  bgUrl.addEventListener('change', function(e) {
    if(e.target.value) {
      body.style.backgroundImage = `url(${e.target.value})`;
    }
  });

  // 8. Транскрибация (распознавание речи через микрофон/системный звук)
  let recognition;
  transcribeBtn.addEventListener('click', () => {
    // Проверка поддержки браузером (лучше всего работает в Chrome/Edge)
    window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!window.SpeechRecognition) {
      alert('Ваш браузер не поддерживает встроенное распознавание речи. Рекомендуется использовать Google Chrome.');
      return;
    }

    if(recognition && transcribeBtn.innerText.includes('Остановить')) {
        recognition.stop();
        transcribeBtn.innerText = '▶ Начать транскрибирование речи';
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = languageSelect.value;
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onstart = function() {
      transcribeBtn.innerText = '⏹ Остановить транскрибирование';
      transcriptionBox.innerHTML = '<em>Слушаю звук... Воспроизведите видео (возможно потребуется направить звук видео в микрофон или использовать стерео-микшер ПК).</em><br>';
    };

    recognition.onresult = function(event) {
      let finalTranscript = '';
      for (let i = event.resultIndex; i < event.results.length; ++i) {
        if (event.results[i].isFinal) {
          finalTranscript += event.results[i][0].transcript + ' ';
        }
      }
      if(finalTranscript) {
         transcriptionBox.innerHTML += finalTranscript + '<br>';
         // Автоскролл вниз
         transcriptionBox.scrollTop = transcriptionBox.scrollHeight;
      }
    };

    recognition.onerror = function(event) {
      console.error("Ошибка распознавания: ", event.error);
    };

    recognition.start();
  });
</script>
</body>
</html>
