<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Универсальный Видеоплеер</title>
    <style>
        :root {
            --primary: #4A90E2;
            --bg-panel: rgba(255, 255, 255, 0.9);
        }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100%; }
        
        #player-container {
            width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #f0f0f0; background-size: cover; background-position: center; position: relative;
        }

        /* Логотип */
        .header-logo {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(255,255,255,0.8); padding: 5px 15px; border-radius: 8px; font-weight: bold;
        }

        /* Панель настроек */
        .settings-panel {
            position: absolute; top: 15px; right: 15px; background: var(--bg-panel); padding: 15px;
            border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10;
            max-width: 300px; max-height: 80vh; overflow-y: auto; transition: 0.3s;
        }
        .settings-panel h3 { margin-top: 0; font-size: 16px; text-align: center; }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 4px; font-weight: bold; }
        .input-group input, .input-group select { width: 100%; padding: 6px; box-sizing: border-box; font-size: 12px; }
        
        /* Видеоплеер */
        .video-wrapper {
            position: relative; width: 80%; max-width: 900px; background: #000; border-radius: 10px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        video { width: 100%; display: block; }
        
        /* Пользовательские контролы */
        .custom-controls {
            position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.7);
            display: flex; flex-wrap: wrap; align-items: center; padding: 10px; box-sizing: border-box; gap: 10px;
        }
        .control-btn { background: none; border: none; color: white; cursor: pointer; font-size: 16px; }
        .control-btn:hover { color: var(--primary); }
        .progress-container { flex-grow: 1; height: 5px; background: #555; cursor: pointer; position: relative; border-radius: 3px;}
        .progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 3px;}
        .time-display { color: white; font-size: 12px; }
        .volume-container { display: flex; align-items: center; gap: 5px; }
        .volume-slider { width: 60px; }
        
        /* Транскрипция и субтитры */
        #transcription-box {
            display: none; width: 80%; max-width: 900px; background: rgba(0,0,0,0.8); color: #fff;
            padding: 15px; margin-top: 10px; border-radius: 8px; font-size: 14px; min-height: 50px; text-align: center;
        }

        /* Экран блокировки (Test Mode) */
        #lock-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: red; font-size: 40px; font-weight: bold;
            align-items: center; justify-content: center; z-index: 100; flex-direction: column;
        }
    </style>
</head>
<body>

<div id="player-container">
    <div class="header-logo">Логотип Моей Группы</div>

    <div class="settings-panel" id="settingsPanel">
        <h3>Настройки медиа</h3>
        
        <div class="input-group">
            <label>1. Видео с ПК</label>
            <input type="file" id="video-upload" accept="video/*">
        </div>
        <div class="input-group">
            <label>2. Видео по ссылке (URL)</label>
            <input type="text" id="video-url" placeholder="https://.../video.mp4">
        </div>
        
        <hr>
        
        <div class="input-group">
            <label>3. Фон с ПК</label>
            <input type="file" id="bg-upload" accept="image/*">
        </div>
        <div class="input-group">
            <label>4. Фон по ссылке (URL)</label>
            <input type="text" id="bg-url" placeholder="https://.../image.jpg">
        </div>
        
        <hr>
        
        <div class="input-group">
            <label>5. Язык интерфейса / субтитров</label>
            <select id="language-select">
                <option value="ru">Русский</option>
                <option value="en">English</option>
                <option value="de">Deutsch</option>
                <option value="fr">Français</option>
                <option value="es">Español</option>
                <option value="it">Italiano</option>
                <option value="pt">Português</option>
                <option value="zh">中文 (Chinese)</option>
                <option value="ja">日本語 (Japanese)</option>
                <option value="ar">العربية (Arabic)</option>
                <option value="hi">हिन्दी (Hindi)</option>
                <option value="fa">فارسی (Farsi)</option>
                <option value="prs">دری (Dari)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Режим работы (согласно вашим правилам)</label>
            <select id="mode-select">
                <option value="normal">Обычный</option>
                <option value="study">Study Mode (Медленно 0.8x, лимит перемотки)</option>
                <option value="master">Master Mode (Loop включен)</option>
                <option value="test">Test Mode (Без перемотки, лимит 2 мин)</option>
            </select>
        </div>
        <button onclick="document.getElementById('settingsPanel').style.display='none'" style="width:100%; padding:5px; margin-top:5px;">Скрыть панель</button>
    </div>

    <div class="video-wrapper">
        <video id="main-video" crossorigin="anonymous">
            </video>
        
        <div id="lock-screen">Time is up</div>

        <div class="custom-controls">
            <button class="control-btn" id="play-pause">▶</button>
            <button class="control-btn" id="rewind">⏪ 10s</button>
            <button class="control-btn" id="forward">10s ⏩</button>
            
            <div class="progress-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            
            <div class="time-display" id="time-display">00:00 / 00:00</div>
            
            <div class="volume-container">
                <button class="control-btn" id="mute-btn">🔊</button>
                <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.1" value="1">
            </div>

            <button class="control-btn" id="slow-mo-btn" style="display:none; font-size:12px;">0.8x</button>
            
            <button class="control-btn" id="cc-btn" title="Субтитры">CC</button>
            <button class="control-btn" id="transcribe-btn" title="Транскрибация">📝</button>
            <button class="control-btn" onclick="document.getElementById('settingsPanel').style.display='block'" title="Настройки">⚙️</button>
        </div>
    </div>

    <div id="transcription-box">
        <em>Транскрибация (распознавание речи браузером)... Говорите в микрофон или ожидайте загрузки текста.</em>
        <div id="transcription-text" style="margin-top: 10px; color: #4A90E2;"></div>
    </div>
</div>

<script>
    const video = document.getElementById('main-video');
    const container = document.getElementById('player-container');
    const playPauseBtn = document.getElementById('play-pause');
    const progressBar = document.getElementById('progress-bar');
    const progressContainer = document.getElementById('progress-container');
    const timeDisplay = document.getElementById('time-display');
    const volumeSlider = document.getElementById('volume-slider');
    const muteBtn = document.getElementById('mute-btn');
    const modeSelect = document.getElementById('mode-select');
    const lockScreen = document.getElementById('lock-screen');
    const slowMoBtn = document.getElementById('slow-mo-btn');
    
    // Переменные для отслеживания логики режимов
    let previousTime = 0;
    let attemptCount = 0; // Для Study mode

    // 1 & 2. Загрузка Видео
    document.getElementById('video-upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) video.src = URL.createObjectURL(file);
    });
    document.getElementById('video-url').addEventListener('change', (e) => {
        if (e.target.value) video.src = e.target.value;
    });

    // 3 & 4. Загрузка Фона
    document.getElementById('bg-upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) container.style.backgroundImage = `url(${URL.createObjectURL(file)})`;
    });
    document.getElementById('bg-url').addEventListener('change', (e) => {
        if (e.target.value) container.style.backgroundImage = `url(${e.target.value})`;
    });

    // Воспроизведение / Пауза
    playPauseBtn.addEventListener('click', () => {
        if (video.paused) { video.play(); playPauseBtn.textContent = '⏸'; } 
        else { video.pause(); playPauseBtn.textContent = '▶'; }
    });

    // Обновление времени и прогресс-бара + ЛОГИКА РЕЖИМОВ
    video.addEventListener('timeupdate', () => {
        if (!video.duration) return;
        
        const mode = modeSelect.value;
        const current = video.currentTime;

        // TEST MODE ЛОГИКА: Таймер 2 минуты (120 сек)
        if (mode === 'test' && current >= 120) {
            video.pause();
            lockScreen.style.display = 'flex';
        }

        // STUDY MODE ЛОГИКА: Блокировка перемотки на 3 попытке (здесь упрощенно отслеживаем попытки клика по прогрессбару)
        
        // Предотвращение перемотки (Test Mode)
        if (mode === 'test' && current - previousTime > 1) {
            video.currentTime = previousTime; // Возвращаем назад
        } else {
            previousTime = current;
        }

        // Обновление UI
        const percent = (video.currentTime / video.duration) * 100;
        progressBar.style.width = `${percent}%`;
        timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
    });

    // Навигация по прогресс-бару (Прокрутка)
    progressContainer.addEventListener('click', (e) => {
        const mode = modeSelect.value;
        
        if (mode === 'test') return; // В Test Mode запрещена перемотка
        
        if (mode === 'study') {
            attemptCount++;
            if (attemptCount >= 3) {
                alert("Перемотка заблокирована (Study Mode: 3 попытка)");
                return;
            }
        }

        const rect = progressContainer.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        video.currentTime = pos * video.duration;
    });

    // Кнопки 10 сек вперед/назад
    document.getElementById('rewind').addEventListener('click', () => video.currentTime -= 10);
    document.getElementById('forward').addEventListener('click', () => {
        if (modeSelect.value === 'test') return; // Блок в Test
        video.currentTime += 10;
    });

    // Громкость
    volumeSlider.addEventListener('input', (e) => {
        video.volume = e.target.value;
        muteBtn.textContent = video.volume === 0 ? '🔇' : '🔊';
    });
    muteBtn.addEventListener('click', () => {
        video.muted = !video.muted;
        muteBtn.textContent = video.muted ? '🔇' : '🔊';
    });

    // Переключение режимов (Study, Master, Test)
    modeSelect.addEventListener('change', (e) => {
        const mode = e.target.value;
        video.loop = (mode === 'master'); // Master Mode: Loop
        slowMoBtn.style.display = (mode === 'study') ? 'inline-block' : 'none'; // Study Mode: Slow Mo button
        lockScreen.style.display = 'none'; // Сброс лока
        attemptCount = 0; // Сброс попыток для Study
        video.playbackRate = 1.0; // Сброс скорости
    });

    // Study Mode: Кнопка замедления (Slow Motion) без изменения высоты звука
    slowMoBtn.addEventListener('click', () => {
        video.preservesPitch = true; // Сохраняем питч
        video.playbackRate = video.playbackRate === 1.0 ? 0.8 : 1.0;
        slowMoBtn.style.color = video.playbackRate === 0.8 ? 'var(--primary)' : 'white';
    });

    // Транскрибация (используем Web Speech API браузера как заглушку для демо)
    const transcribeBtn = document.getElementById('transcribe-btn');
    const transBox = document.getElementById('transcription-box');
    const transText = document.getElementById('transcription-text');
    
    transcribeBtn.addEventListener('click', () => {
        transBox.style.display = transBox.style.display === 'none' || transBox.style.display === '' ? 'block' : 'none';
        
        if(transBox.style.display === 'block' && 'webkitSpeechRecognition' in window) {
            const recognition = new webkitSpeechRecognition();
            recognition.lang = document.getElementById('language-select').value;
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.onresult = function(event) {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                }
                transText.innerText += finalTranscript + ' ';
            };
            recognition.start();
        } else if (transBox.style.display === 'block') {
            transText.innerText = "Авто-транскрибация звука видео в реальном времени требует серверного API, но вы можете загрузить файл субтитров .vtt.";
        }
    });

    // Утилита форматирования времени
    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
    }
</script>

</body>
</html>
