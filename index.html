<!DOCTYPE html><!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#c2185b">
<meta name="description" content="ИгроМир в Сундучке — Видеоредактор для создания образовательного контента">
<title>ИгроМир в Сундучке — Видеоредактор</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
--rose:#c2185b;--rose2:#e91e63;--rose-l:#f48fb1;--pk3:#fce4ec;
--pur:#7b1fa2;--pur2:#ce93d8;
--gold:#b8860b;--gold-l:#d4a017;
--cream:#fff8f0;--cream2:#fdeee4;
--border:#f0c0cc;--border2:#e8a0b4;
--txt:#3a1020;--txt2:#6a2840;--txt3:#9a4060;
--shadow:rgba(180,40,80,.13);
--success:#4caf50;--warning:#ff9800;--error:#f44336;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{
min-height:100vh;font-family:'IM Fell English',serif;color:var(--txt);
background:linear-gradient(150deg,#fff5f8 0%,#fef0e8 35%,#f8f0ff 65%,#f0fff5 100%);
overflow-x:hidden;
}
#bgCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.3;}
/* ── HEADER ── */
.hdr{position:relative;z-index:10;text-align:center;padding:8px 16px 6px;
background:linear-gradient(135deg,rgba(255,240,248,.97),rgba(255,248,240,.97));
border-bottom:2px solid var(--rose-l);box-shadow:0 2px 20px var(--shadow);
backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.hdr-logo{width:68px;height:68px;border-radius:50%;border:3px solid var(--rose2);
object-fit:cover;pointer-events:none;user-select:none;
animation:lglow 3s ease-in-out infinite alternate;}
@keyframes lglow{
from{box-shadow:0 0 8px var(--rose-l),0 0 0 3px rgba(233,30,99,.1);}
to{box-shadow:0 0 22px var(--rose2),0 0 0 5px rgba(233,30,99,.2);}}
.hdr-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(13px,2vw,22px);
color:var(--rose);text-shadow:1px 1px 0 #fff,0 0 20px rgba(194,24,91,.25);
margin-top:3px;letter-spacing:2px;}
.march8{display:inline-block;background:linear-gradient(90deg,var(--rose),var(--pur),#e64a19);
border-radius:30px;padding:2px 14px;font-size:10px;color:#fff;letter-spacing:1px;
margin-top:3px;animation:m8 2s ease-in-out infinite alternate;}
@keyframes m8{from{box-shadow:0 2px 8px rgba(194,24,91,.3);}
to{box-shadow:0 4px 20px rgba(194,24,91,.5);}}
.hdr-sub{font-style:italic;color:var(--txt3);font-size:10px;margin-top:2px;}
.orn{color:var(--rose2);font-size:13px;letter-spacing:6px;margin:2px 0;opacity:.5;}
.hdr-tools{position:absolute;top:10px;right:12px;}
.icon-btn{background:rgba(194,24,91,.08);border:1px solid var(--rose-l);color:var(--rose);
border-radius:8px;width:34px;height:34px;display:flex;align-items:center;
justify-content:center;cursor:pointer;font-size:17px;transition:all .2s;position:relative;}
.icon-btn:hover{background:rgba(194,24,91,.18);border-color:var(--rose2);transform:scale(1.05);}
.icon-btn:active{transform:scale(0.95);}
.lang-drop{position:absolute;top:40px;right:0;
background:linear-gradient(135deg,#fff5f8,#fff8f0);
border:1px solid var(--border);border-radius:10px;padding:7px;
display:none;grid-template-columns:repeat(4,1fr);gap:4px;
z-index:300;min-width:190px;box-shadow:0 8px 30px var(--shadow);
animation:slideDown .2s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.lang-drop.open{display:grid;}
.lbtn{background:rgba(194,24,91,.06);border:1px solid var(--border);
border-radius:5px;padding:4px 2px;color:var(--txt2);
font-size:9px;cursor:pointer;text-align:center;transition:all .2s;}
.lbtn:hover,.lbtn.active{background:rgba(194,24,91,.15);border-color:var(--rose2);color:var(--rose);transform:scale(1.05);}
.lflag{font-size:14px;display:block;}
/* ── 3-COLUMN LAYOUT ── */
.wrap{position:relative;z-index:1;max-width:1500px;margin:0 auto;
padding:10px;display:grid;
grid-template-columns:230px 1fr 230px;
grid-template-rows:auto auto auto;
gap:10px;}
.col-left{grid-column:1;grid-row:1/4;display:flex;flex-direction:column;gap:10px;}
.col-right{grid-column:3;grid-row:1/4;display:flex;flex-direction:column;gap:10px;}
.player-panel{grid-column:2;grid-row:1/3;display:flex;flex-direction:column;}
.sbar{grid-column:1/-1;}
.panel{background:rgba(255,248,245,.93);border:1px solid var(--border);
border-radius:10px;padding:11px;box-shadow:0 2px 14px var(--shadow);
transition:box-shadow .3s;}
.panel:hover{box-shadow:0 4px 20px var(--shadow);}
.ptitle{font-family:'Cinzel Decorative',cursive;font-size:9px;color:var(--rose);
text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;padding-bottom:5px;
border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px;}
.slbl{font-size:8px;color:var(--pur);text-transform:uppercase;letter-spacing:1px;
margin:7px 0 3px;font-family:'Cinzel Decorative',cursive;}
.hint{font-size:8px;color:var(--txt3);opacity:.75;margin-bottom:3px;line-height:1.4;}
/* ── INPUTS ── */
.url-in{width:100%;background:#fff;border:1px solid var(--border);border-radius:5px;
padding:5px 7px;color:var(--txt);font-size:10px;font-family:monospace;
margin-bottom:4px;transition:border-color .2s,box-shadow .2s;}
.url-in:focus{outline:none;border-color:var(--rose2);box-shadow:0 0 0 2px rgba(233,30,99,.1);}
.url-in::placeholder{color:rgba(106,40,64,.28);}
select{background:#fff;border:1px solid var(--border);border-radius:5px;
padding:4px 7px;color:var(--txt);font-size:10px;width:100%;cursor:pointer;margin-bottom:5px;
transition:border-color .2s;}
select:focus{outline:none;border-color:var(--rose2);}
.btn{background:linear-gradient(135deg,var(--rose),#ad1457);border:none;
border-radius:5px;padding:6px 8px;color:#fff;font-family:'Cinzel Decorative',cursive;
font-size:8px;font-weight:700;cursor:pointer;width:100%;transition:all .2s;
letter-spacing:1px;margin-top:3px;box-shadow:0 2px 7px rgba(194,24,91,.3);}
.btn:hover{background:linear-gradient(135deg,var(--rose2),var(--rose));
transform:translateY(-1px);box-shadow:0 4px 14px rgba(194,24,91,.45);}
.btn:active{transform:translateY(0);box-shadow:0 2px 7px rgba(194,24,91,.3);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-ol{background:#fff;border:1px solid var(--border2);color:var(--rose);box-shadow:none;}
.btn-ol:hover{background:rgba(194,24,91,.05);}
.btn-sm{padding:4px 6px;font-size:7.5px;}
.upzone{border:2px dashed var(--border2);border-radius:7px;padding:9px 4px;
text-align:center;cursor:pointer;transition:all .3s;margin-bottom:5px;
background:rgba(255,240,248,.4);position:relative;overflow:hidden;}
.upzone:hover{border-color:var(--rose2);background:rgba(233,30,99,.05);}
.upzone.dragover{border-color:var(--rose2);background:rgba(233,30,99,.1);transform:scale(1.02);}
.upzone input[type=file]{position:absolute;top:0;left:0;right:0;bottom:0;
opacity:0;cursor:pointer;width:100%;height:100%;}
.up-ic{font-size:18px;display:block;}
.up-lbl{font-size:9px;color:var(--txt3);margin-top:1px;}
.asp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:6px;}
.asp-btn{background:#fff;border:1px solid var(--border);border-radius:5px;
padding:4px 2px;color:var(--txt2);font-size:9px;cursor:pointer;text-align:center;transition:all .2s;}
.asp-btn:hover,.asp-btn.active{background:rgba(194,24,91,.1);border-color:var(--rose2);color:var(--rose);}
.custom-asp{display:none;gap:3px;align-items:center;margin-bottom:5px;}
.custom-asp.show{display:flex;}
.custom-asp input{width:44px;background:#fff;border:1px solid var(--border);
border-radius:4px;padding:3px 4px;color:var(--txt);font-size:10px;
font-family:monospace;text-align:center;}
/* ── PLAYER (center column) ── */
#vstage{
position:relative;width:100%;
background:#0d0d0d;
border-radius:8px 8px 0 0;overflow:hidden;
border:2px solid var(--border2);border-bottom:none;
box-shadow:0 0 0 1px rgba(194,24,91,.1),0 4px 24px rgba(0,0,0,.2);
transition:box-shadow .3s;}
#vstage:hover{box-shadow:0 0 0 1px rgba(194,24,91,.2),0 6px 30px rgba(0,0,0,.3);}
#vstage-sizer{display:block;width:100%;padding-bottom:56.25%;}
.vslayer{position:absolute;top:0;left:0;width:100%;height:100%;}
#bgOv{z-index:1;background-size:cover;background-position:center;pointer-events:none;
transition:opacity .3s;}
#vp{
display:none;
object-fit:contain;
z-index:2;
background:transparent;
transform:translateZ(0);
-webkit-transform:translateZ(0);}
#ifc{display:none;z-index:2;}
#ifc iframe{width:100%;height:100%;border:none;display:block;}
#vph{
display:flex;flex-direction:column;align-items:center;justify-content:center;
z-index:3;pointer-events:none;
background:linear-gradient(135deg,#1a0a0e,#2d0a1e);}
#vph .phi{font-size:44px;opacity:.35;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.35;}50%{opacity:.5;}}
#vph p{font-size:11px;color:rgba(255,255,255,.35);margin-top:5px;font-style:italic;}
/* ── SUBTITLE OVERLAY ── */
#subOv{
display:none;
position:absolute;
bottom:0;left:0;right:0;
width:100%;
padding:10px 6% 12px;
background:linear-gradient(to top,
rgba(0,0,0,.9) 0%,
rgba(0,0,0,.6) 60%,
transparent 100%);
font-size:clamp(10px,2cqw,20px);
text-align:center;
white-space:pre-wrap;word-break:break-word;
z-index:25;
line-height:1.5;
text-shadow:
0 0 6px #000,
1px 1px 0 rgba(0,0,0,.9),
-1px -1px 0 rgba(0,0,0,.9),
1px -1px 0 rgba(0,0,0,.9),
-1px  1px 0 rgba(0,0,0,.9),
0  3px 10px rgba(0,0,0,.95);
color:#fff;
pointer-events:none;
opacity:1;
transition:opacity .35s ease;
box-sizing:border-box;}
#subOv.sub-fade{opacity:0;}
#subLangBadge{
display:inline-block;
font-size:9px;
background:rgba(194,24,91,.8);
color:#fff;
border-radius:3px;
padding:0 4px;
margin-right:6px;
vertical-align:middle;
text-shadow:none;}
/* ── CONTROLS ── */
.ctrls{background:linear-gradient(135deg,rgba(255,248,245,.97),rgba(255,240,248,.97));
border:2px solid var(--border);border-top:none;border-radius:0 0 8px 8px;
padding:7px 10px;box-shadow:0 4px 14px var(--shadow);}
.pbwrap{height:5px;background:rgba(194,24,91,.15);border-radius:3px;
cursor:pointer;margin-bottom:7px;position:relative;transition:height .2s;}
.pbwrap:hover{height:7px;}
.pbfill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose2));
border-radius:3px;width:0%;transition:width .1s;position:relative;}
.pbfill::after{content:'';position:absolute;right:-5px;top:-4px;
width:12px;height:12px;background:#fff;border-radius:50%;
box-shadow:0 0 0 3px var(--rose2);transition:transform .2s;}
.pbwrap:hover .pbfill::after{transform:scale(1.2);}
.crow{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.cbtn{background:#fff;border:1px solid var(--border2);color:var(--rose);
border-radius:50%;width:30px;height:30px;display:flex;align-items:center;
justify-content:center;cursor:pointer;font-size:12px;transition:all .2s;flex-shrink:0;}
.cbtn:hover{background:rgba(194,24,91,.1);border-color:var(--rose2);transform:scale(1.1);}
.cbtn:active{transform:scale(0.95);}
.cbtn.pbtn{width:36px;height:36px;font-size:15px;}
.tdsp{font-family:monospace;font-size:10px;color:var(--txt3);min-width:84px;text-align:center;}
.vwrap{display:flex;align-items:center;gap:4px;margin-left:auto;}
.vsldr{-webkit-appearance:none;width:55px;height:4px;border-radius:2px;
background:rgba(194,24,91,.2);outline:none;cursor:pointer;transition:width .2s;}
.vsldr:hover{width:65px;}
.vsldr::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;
border-radius:50%;background:var(--rose2);cursor:pointer;transition:transform .2s;}
.vsldr::-webkit-slider-thumb:hover{transform:scale(1.2);}
.sbtn{background:#fff;border:1px solid var(--border);color:var(--txt2);
border-radius:3px;padding:2px 5px;font-size:9px;cursor:pointer;transition:all .2s;}
.sbtn:hover,.sbtn.active{background:rgba(194,24,91,.1);color:var(--rose);border-color:var(--rose2);}
.spd-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
/* ── SUBTITLE LANGUAGE SELECTOR ── */
.sub-lang-row{display:flex;gap:4px;align-items:center;margin-bottom:5px;flex-wrap:wrap;}
.sub-lang-btn{background:#fff;border:1px solid var(--border);border-radius:4px;
padding:2px 5px;font-size:9px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.sub-lang-btn:hover,.sub-lang-btn.active{background:rgba(194,24,91,.12);
border-color:var(--rose2);color:var(--rose);}
/* ── COMMON UI ── */
.trow{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.tsw{position:relative;width:32px;height:17px;}
.tsw input{opacity:0;width:0;height:0;}
.tsl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;
background:rgba(194,24,91,.15);border:1px solid var(--border2);
border-radius:20px;transition:.3s;}
.tsl:before{content:'';position:absolute;width:11px;height:11px;left:2px;bottom:2px;
background:var(--border2);border-radius:50%;transition:.3s;}
input:checked+.tsl{background:rgba(194,24,91,.3);border-color:var(--rose2);}
input:checked+.tsl:before{transform:translateX(15px);background:var(--rose2);}
.tlbl{font-size:9px;color:var(--txt2);}
.txta{width:100%;background:#fff;border:1px solid var(--border);border-radius:5px;
padding:5px;color:var(--txt);font-size:10px;font-family:monospace;
resize:vertical;min-height:65px;transition:border-color .2s;}
.txta:focus{outline:none;border-color:var(--rose2);}
.tbox{background:#fff;border:1px solid var(--border);border-radius:5px;
padding:6px;min-height:55px;font-size:10px;color:var(--txt3);
line-height:1.6;overflow-y:auto;max-height:90px;word-break:break-word;}
.code-a{width:100%;background:#1a0a14;border:1px solid var(--border2);border-radius:5px;
padding:7px;color:#a8e6cf;font-size:9px;font-family:'Courier New',monospace;
resize:vertical;min-height:80px;line-height:1.5;}
.code-a:focus{outline:none;border-color:var(--rose2);}
.tabrow{display:flex;gap:3px;margin-bottom:6px;}
.tabbtn{background:#fff;border:1px solid var(--border);border-radius:4px 4px 0 0;
padding:3px 7px;color:var(--txt3);font-size:8px;cursor:pointer;
font-family:'Cinzel Decorative',cursive;transition:all .2s;}
.tabbtn.active{background:rgba(194,24,91,.1);border-color:var(--rose2);color:var(--rose);}
.row2{display:flex;gap:4px;margin-top:4px;}
.row2 .btn{width:auto;flex:1;}
hr.dv{border:none;border-top:1px solid var(--border);margin:6px 0;}
.sbar{position:relative;z-index:1;
background:linear-gradient(135deg,rgba(255,248,245,.92),rgba(255,240,248,.92));
border:1px solid var(--border);border-radius:6px;padding:4px 10px;
font-size:9px;color:var(--txt3);font-family:monospace;
display:flex;align-items:center;gap:7px;box-shadow:0 2px 8px var(--shadow);}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--rose2);
animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.toast{position:fixed;bottom:14px;right:14px;
background:linear-gradient(135deg,#fff0f4,#fff8f0);
border:1px solid var(--border2);border-radius:8px;padding:8px 13px;
color:var(--rose);font-size:11px;z-index:9999;opacity:0;
transform:translateY(14px);transition:all .3s;pointer-events:none;max-width:280px;
box-shadow:0 4px 18px var(--shadow);display:flex;align-items:center;gap:6px;}
.toast.show{opacity:1;transform:translateY(0);}
.toast-icon{font-size:14px;}
.badge{display:inline-block;background:rgba(194,24,91,.1);
border:1px solid var(--border2);border-radius:20px;
padding:1px 5px;font-size:8px;color:var(--rose);margin-left:3px;font-family:monospace;}
.tstat{font-size:9px;padding:3px 6px;border-radius:4px;margin-bottom:4px;text-align:center;display:none;}
.tstat.on{display:block;background:rgba(50,150,50,.08);border:1px solid rgba(50,180,50,.3);color:#1a6a1a;}
.tstat.err{display:block;background:rgba(200,50,50,.08);border:1px solid rgba(200,50,50,.3);color:#8b1a1a;}
.warn-box{background:#fff8f0;border:1px solid #ffb74d;border-radius:4px;
padding:4px 7px;font-size:8px;color:#7a4000;margin-bottom:5px;line-height:1.4;}
.sub-info{font-size:8px;color:var(--txt3);font-style:italic;margin-top:2px;}
/* Loading indicator */
.loading{position:relative;}
.loading::after{content:'';position:absolute;top:50%;left:50%;
width:20px;height:20px;margin:-10px 0 0 -10px;
border:2px solid var(--rose-l);border-top-color:var(--rose);
border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* ── RESPONSIVE ── */
@media(max-width:1100px){
.wrap{grid-template-columns:200px 1fr 200px;}
}
@media(max-width:800px){
.wrap{grid-template-columns:1fr;grid-template-rows:auto;}
.col-left,.col-right{grid-column:1;grid-row:auto;}
.player-panel{grid-column:1;grid-row:auto;}
.sbar{grid-column:1;}
.hdr-tools{position:static;margin-top:5px;}
.lang-drop{right:50%;transform:translateX(50%);top:45px;}
}
@media(max-width:480px){
.hdr-title{font-size:14px;}
.hdr-logo{width:50px;height:50px;}
.panel{padding:8px;}
.cbtn{width:28px;height:28px;font-size:11px;}
.cbtn.pbtn{width:32px;height:32px;}
.vsldr{width:45px;}
}
/* Print styles */
@media print{
#bgCanvas,.hdr-tools,.ctrls,.col-left,.col-right{display:none;}
.wrap{display:block;}
.player-panel{width:100%;}
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

.vsldr::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;
border-radius:50%;background:var(--rose2);cursor:pointer;transition:transform .2s;}
.vsldr::-webkit-slider-thumb:hover{transform:scale(1.2);}
.sbtn{background:#fff;border:1px solid var(--border);color:var(--txt2);
border-radius:3px;padding:2px 5px;font-size:9px;cursor:pointer;transition:all .2s;}
.sbtn:hover,.sbtn.active{background:rgba(194,24,91,.1);color:var(--rose);border-color:var(--rose2);}
.spd-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
/* ── SUBTITLE LANGUAGE SELECTOR ── */
.sub-lang-row{display:flex;gap:4px;align-items:center;margin-bottom:5px;flex-wrap:wrap;}
.sub-lang-btn{background:#fff;border:1px solid var(--border);border-radius:4px;
padding:2px 5px;font-size:9px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.sub-lang-btn:hover,.sub-lang-btn.active{background:rgba(194,24,91,.12);
border-color:var(--rose2);color:var(--rose);}
/* ── COMMON UI ── */
.trow{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.tsw{position:relative;width:32px;height:17px;}
.tsw input{opacity:0;width:0;height:0;}
.tsl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;
background:rgba(194,24,91,.15);border:1px solid var(--border2);
border-radius:20px;transition:.3s;}
.tsl:before{content:'';position:absolute;width:11px;height:11px;left:2px;bottom:2px;
background:var(--border2);border-radius:50%;transition:.3s;}
input:checked+.tsl{background:rgba(194,24,91,.3);border-color:var(--rose2);}
input:checked+.tsl:before{transform:translateX(15px);background:var(--rose2);}
.tlbl{font-size:9px;color:var(--txt2);}
.txta{width:100%;background:#fff;border:1px solid var(--border);border-radius:5px;
padding:5px;color:var(--txt);font-size:10px;font-family:monospace;
resize:vertical;min-height:65px;transition:border-color .2s;}
.txta:focus{outline:none;border-color:var(--rose2);}
.tbox{background:#fff;border:1px solid var(--border);border-radius:5px;
padding:6px;min-height:55px;font-size:10px;color:var(--txt3);
line-height:1.6;overflow-y:auto;max-height:90px;word-break:break-word;}
.code-a{width:100%;background:#1a0a14;border:1px solid var(--border2);border-radius:5px;
padding:7px;color:#a8e6cf;font-size:9px;font-family:'Courier New',monospace;
resize:vertical;min-height:80px;line-height:1.5;}
.code-a:focus{outline:none;border-color:var(--rose2);}
.tabrow{display:flex;gap:3px;margin-bottom:6px;}
.tabbtn{background:#fff;border:1px solid var(--border);border-radius:4px 4px 0 0;
padding:3px 7px;color:var(--txt3);font-size:8px;cursor:pointer;
font-family:'Cinzel Decorative',cursive;transition:all .2s;}
.tabbtn.active{background:rgba(194,24,91,.1);border-color:var(--rose2);color:var(--rose);}
.row2{display:flex;gap:4px;margin-top:4px;}
.row2 .btn{width:auto;flex:1;}
hr.dv{border:none;border-top:1px solid var(--border);margin:6px 0;}
.sbar{position:relative;z-index:1;
background:linear-gradient(135deg,rgba(255,248,245,.92),rgba(255,240,248,.92));
border:1px solid var(--border);border-radius:6px;padding:4px 10px;
font-size:9px;color:var(--txt3);font-family:monospace;
display:flex;align-items:center;gap:7px;box-shadow:0 2px 8px var(--shadow);}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--rose2);
animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.toast{position:fixed;bottom:14px;right:14px;
background:linear-gradient(135deg,#fff0f4,#fff8f0);
border:1px solid var(--border2);border-radius:8px;padding:8px 13px;
color:var(--rose);font-size:11px;z-index:9999;opacity:0;
transform:translateY(14px);transition:all .3s;pointer-events:none;max-width:280px;
box-shadow:0 4px 18px var(--shadow);display:flex;align-items:center;gap:6px;}
.toast.show{opacity:1;transform:translateY(0);}
.toast-icon{font-size:14px;}
.badge{display:inline-block;background:rgba(194,24,91,.1);
border:1px solid var(--border2);border-radius:20px;
padding:1px 5px;font-size:8px;color:var(--rose);margin-left:3px;font-family:monospace;}
.tstat{font-size:9px;padding:3px 6px;border-radius:4px;margin-bottom:4px;text-align:center;display:none;}
.tstat.on{display:block;background:rgba(50,150,50,.08);border:1px solid rgba(50,180,50,.3);color:#1a6a1a;}
.tstat.err{display:block;background:rgba(200,50,50,.08);border:1px solid rgba(200,50,50,.3);color:#8b1a1a;}
.warn-box{background:#fff8f0;border:1px solid #ffb74d;border-radius:4px;
padding:4px 7px;font-size:8px;color:#7a4000;margin-bottom:5px;line-height:1.4;}
.sub-info{font-size:8px;color:var(--txt3);font-style:italic;margin-top:2px;}
/* Loading indicator */
.loading{position:relative;}
.loading::after{content:'';position:absolute;top:50%;left:50%;
width:20px;height:20px;margin:-10px 0 0 -10px;
border:2px solid var(--rose-l);border-top-color:var(--rose);
border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* ── RESPONSIVE ── */
@media(max-width:1100px){
.wrap{grid-template-columns:200px 1fr 200px;}
}
@media(max-width:800px){
.wrap{grid-template-columns:1fr;grid-template-rows:auto;}
.col-left,.col-right{grid-column:1;grid-row:auto;}
.player-panel{grid-column:1;grid-row:auto;}
.sbar{grid-column:1;}
.hdr-tools{position:static;margin-top:5px;}
.lang-drop{right:50%;transform:translateX(50%);top:45px;}
}
@media(max-width:480px){
.hdr-title{font-size:14px;}
.hdr-logo{width:50px;height:50px;}
.panel{padding:8px;}
.cbtn{width:28px;height:28px;font-size:11px;}
.cbtn.pbtn{width:32px;height:32px;}
.vsldr{width:45px;}
}
/* Print styles */
@media print{
#bgCanvas,.hdr-tools,.ctrls,.col-left,.col-right{display:none;}
.wrap{display:block;}
.player-panel{width:100%;}
}
</style>
</head>
